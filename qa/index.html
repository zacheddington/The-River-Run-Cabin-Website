            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We recommend visiting Three Rivers Ranch for guide information."
            }
          },
          {
            "@type": "Question",
            "name": "Where can I rent boats, tubes, or motorsports equipment?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Float boat rentals from Miller Drift Boats in Ashton, kayak/tube/raft rentals from Rapid River Rentals in Ashton, and motorsport rentals (ATV/UTV/Snowmobile) from Goldenspike Powersports in Ashton or Island Park Adventures in Island Park. Machines are not provided with your cabin rental."
            }
          },
          {
            "@type": "Question",
            "name": "Where are the nearest airports?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Idaho Falls (IDA) 54 miles/1h, Pocatello (PIC) 111 miles/1h 40m, Jackson WY (JAC) 86 miles/1h 50m, Bozeman MT (BZN) 143 miles/2h 40m, Boise (BOI) 334 miles/4h 40m, Yellowstone Airport (WYS) 55 miles/1h (summer only)."
            }
          },
          {
            "@type": "Question",
            "name": "What local restaurants are nearby?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "In Ashton (4 miles): Big Jud's, 511 Main Fountain & Pizzeria, El Rincon Mexican, Trails Inn, Frost Top Drive-In, Subway & Hot Stuff Pizza, Dave's Market & Deli. In St. Anthony (18 miles): Fong's Cafe, Crissy's Chicken To Go, Soul Fly Pizza. In Island Park (20-30 miles): Last Chance Bar & Grill at TroutHunter, Cafe Sabor, Lakeside Lodge Restaurant, Pond's Lodge Restaurant."
            }
          },
          {
            "@type": "Question",
            "name": "Where are the nearest fly shops?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "TRR Outfitters Fly Shop in Ashton (208-652-3008), TRR Outfitters Fly Shop in Island Park (208-558-7501), TroutHunter in Island Park (208-558-8006), Henry's Fork Anglers in Island Park (208-558-7525)."
            }
          }
        ]
      }
